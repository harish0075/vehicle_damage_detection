name: vehicle_damage_detector
description: "AI-powered vehicle damage detection and tracking app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  
  # State Management
  provider: ^6.1.5+1
  
  # HTTP & API
  dio: ^5.4.0
  
  # Image & File Handling
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  
  # Charts
  fl_chart: ^0.66.0
  
  # Utilities
  intl: ^0.19.0
  path_provider: ^2.1.2
  shimmer: ^3.0.0
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  google_sign_in: 6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  # Enable custom fonts
  # assets:
  #   - assets/images/
